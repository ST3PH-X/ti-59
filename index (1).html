<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Texas Instruments TI-59 - Authentic Simulator</title>
    <style>:root{--bg-color:#0b0c0e;--case-color:#24241f;--led-on:#ff082b;--led-glow:rgba(255, 8, 43, 0.8);--gold:#dfb226}body{background-color:var(--bg-color);color:#fff;font-family:'Courier New',monospace;margin:0;padding:10px;display:flex;flex-direction:column;align-items:center;user-select:none;box-sizing:border-box;-webkit-text-size-adjust:100%}.calculator-case{background:linear-gradient(145deg,#2e2e28,#1c1c18);width:100%;max-width:380px;padding:20px 18px 15px 18px;border-radius:16px 16px 40px 40px;box-shadow:0 25px 60px rgba(0,0,0,.95),inset 0 3px 1px rgba(255,255,255,.15),inset 0 -5px 10px rgba(0,0,0,.6);border:1px solid #1a1a16;box-sizing:border-box}.brand-panel{background:linear-gradient(to bottom,#3a3a33,#252520);border-bottom:2px solid #111;padding:6px;text-align:center;font-size:13px;font-weight:700;color:#d1d1c4;letter-spacing:3px;margin-bottom:15px;border-radius:4px;box-shadow:inset 0 1px 3px rgba(0,0,0,.5),0 1px 1px rgba(255,255,255,.1)}.led-display{background:linear-gradient(to bottom,#080000,#180000);border:4px solid #161613;padding:12px 15px;border-radius:6px;text-align:right;margin-bottom:20px;box-shadow:inset 0 5px 15px rgba(0,0,0,.9),0 2px 2px rgba(255,255,255,.05);border-bottom:2px solid #444}#display-text{color:var(--led-on);font-size:32px;font-weight:700;letter-spacing:2px;text-shadow:0 0 10px var(--led-glow),0 0 20px var(--led-glow);font-family:'Courier New',monospace;font-style:italic}.switch-container{display:flex;justify-content:center;align-items:center;background:linear-gradient(to bottom,#111,#222);padding:6px;border-radius:8px;margin-bottom:20px;box-shadow:inset 0 2px 5px #000,0 1px 1px rgba(255,255,255,.1);gap:10px;border:1px solid #333}.mode-label{font-size:10px;color:#888;font-weight:700;letter-spacing:1px}.angle-switch{background:#333;border:1px solid #111;color:#aaa;padding:4px 8px;font-size:10px;border-radius:4px;cursor:pointer;font-weight:700}.angle-switch.active{background:linear-gradient(to bottom,#f90,#c60);color:#000;border-color:#840;text-shadow:0 1px 0 rgba(255,255,255,.2)}.keyboard-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px 6px}.key-wrapper{display:flex;flex-direction:column;align-items:center}.second-func-label{font-size:9px;color:var(--gold);font-weight:700;height:12px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}.ti-btn{background:linear-gradient(135deg,#4d4d45,#2d2d28);border:1px solid #1f1f1a;border-radius:4px;color:#fff;padding:14px 0;width:100%;font-size:12px;font-weight:700;cursor:pointer;text-shadow:0 -1px 0 rgba(0,0,0,.4);box-shadow:0 4px 0 #151512,0 5px 6px rgba(0,0,0,.5),inset 0 1px 1px rgba(255,255,255,.2);transition:all 40ms ease;text-align:center;-webkit-tap-highlight-color:transparent}.ti-btn:active{box-shadow:0 1px 0 #151512,0 1px 2px rgba(0,0,0,.5);transform:translateY(3px)}.ti-btn.active-prefix{background:linear-gradient(135deg,#fe0,#bfa300)!important;color:#000!important;text-shadow:none!important}.ti-btn.func{background:linear-gradient(135deg,#e3e3d3,#b5b5a2);color:#111;border-color:#8c8c7e;box-shadow:0 4px 0 #6e6e63,0 5px 6px rgba(0,0,0,.5)}.ti-btn.op{background:linear-gradient(135deg,#c76536,#913c16);border-color:#612307;box-shadow:0 4px 0 #541d04,0 5px 6px rgba(0,0,0,.5)}.ti-btn.num{background:linear-gradient(135deg,#242420,#121210);border-color:#050504;box-shadow:0 4px 0 #000,0 5px 6px rgba(0,0,0,.6)}.case-embossed-brand{margin-top:15px;font-size:11px;font-weight:700;text-align:center;letter-spacing:2px;text-transform:uppercase;color:#151512;text-shadow:1px 1px 1px rgba(255,255,255,.1),-1px -1px 1px #000}@media (max-width:400px){body{padding:4px}.calculator-case{padding:15px 10px;border-radius:12px 12px 30px 30px}.ti-btn{padding:11px 0;font-size:11px}#display-text{font-size:26px}}</style>
</head>
<body>
<div class="calculator-case">
    <div class="brand-panel">TEXAS INSTRUMENTS TI-59</div>
    <div class="led-display"><span id="display-text">0.</span></div>
    <div class="switch-container">
        <span class="mode-label">ANGLE MODE:</span>
        <button class="angle-switch active" id="btn-deg" onclick='setAngleMode("DEG")'>DEG</button>
        <button class="angle-switch" id="btn-rad" onclick='setAngleMode("RAD")'>RAD</button>
        <button class="angle-switch" id="btn-grad" onclick='setAngleMode("GRAD")'>GRAD</button>
    </div>

    <div class="keyboard-grid">
        
        <div class="key-wrapper"><span class="second-func-label">A'</span><button class="ti-btn func" onclick='pressKey("A")'>A</button></div>
        <div class="key-wrapper"><span class="second-func-label">B'</span><button class="ti-btn func" onclick='pressKey("B")'>B</button></div>
        <div class="key-wrapper"><span class="second-func-label">C'</span><button class="ti-btn func" onclick='pressKey("C")'>C</button></div>
        <div class="key-wrapper"><span class="second-func-label">D'</span><button class="ti-btn func" onclick='pressKey("D")'>D</button></div>
        <div class="key-wrapper"><span class="second-func-label">E'</span><button class="ti-btn func" onclick='pressKey("E")'>E</button></div>
        
        <div class="key-wrapper"><span class="second-func-label"></span><button class="ti-btn" id="key-2nd" onclick='pressKey("2nd")'>2nd</button></div>
        <div class="key-wrapper"><span class="second-func-label"></span><button class="ti-btn" id="key-INV" onclick='pressKey("INV")'>INV</button></div>
        <div class="key-wrapper"><span class="second-func-label">log</span><button class="ti-btn" onclick='pressKey("LNX")'>lnx</button></div>
        <div class="key-wrapper"><span class="second-func-label">deg</span><button class="ti-btn" onclick='pressKey("CE")'>CE</button></div>
        <div class="key-wrapper"><span class="second-func-label">rad</span><button class="ti-btn op" onclick='pressKey("CLR")'>CLR</button></div>
        
        <div class="key-wrapper"><span class="second-func-label">xt</span><button class="ti-btn" onclick='pressKey("LRN")'>LRN</button></div>
        <div class="key-wrapper"><span class="second-func-label">int</span><button class="ti-btn" onclick='pressKey("SST")'>SST</button></div>
        <div class="key-wrapper"><span class="second-func-label">cms</span><button class="ti-btn" id="key-BST" onclick='pressKey("BST")'>BST</button></div>
        <div class="key-wrapper"><span class="second-func-label">exc</span><button class="ti-btn" onclick='pressKey("IND")'>IND</button></div>
        <div class="key-wrapper"><span class="second-func-label">prd</span><button class="ti-btn" onclick='pressKey("GTO")'>GTO</button></div>
        
        <div class="key-wrapper"><span class="second-func-label">ind</span><button class="ti-btn" onclick='pressKey("X2")'>x²</button></div>
        <div class="key-wrapper"><span class="second-func-label">inv</span><button class="ti-btn" onclick='pressKey("SQRT")'>√x</button></div>
        <div class="key-wrapper"><span class="second-func-label">|x|</span><button class="ti-btn" onclick='pressKey("INVX")'>1/x</button></div>
        <div class="key-wrapper"><span class="second-func-label">x=t</span><button class="ti-btn" onclick='pressKey("FLG")'>Pause</button></div>
        <div class="key-wrapper"><span class="second-func-label">arcsin</span><button class="ti-btn" onclick='pressKey("SIN")'>sin</button></div>
        
        <div class="key-wrapper"><span class="second-func-label">lbl</span><button class="ti-btn" onclick='pressKey("STO")'>STO</button></div>
        <div class="key-wrapper"><span class="second-func-label">stflg</span><button class="ti-btn" onclick='pressKey("RCL")'>RCL</button></div>
        <div class="key-wrapper"><span class="second-func-label">p->r</span><button class="ti-btn" onclick='pressKey("SUM")'>SUM</button></div>
        <div class="key-wrapper"><span class="second-func-label">mean</span><button class="ti-btn" onclick='pressKey("Y_X")'>yⁿ</button></div>
        <div class="key-wrapper"><span class="second-func-label">arccos</span><button class="ti-btn" onclick='pressKey("COS")'>cos</button></div>
        
        <div class="key-wrapper"><span class="second-func-label">nop</span><button class="ti-btn" onclick='pressKey("EE")'>EE</button></div>
        <div class="key-wrapper"><span class="second-func-label">op</span><button class="ti-btn num" onclick='pressKey("7")'>7</button></div>
        <div class="key-wrapper"><span class="second-func-label">lbl</span><button class="ti-btn num" onclick='pressKey("8")'>8</button></div>
        <div class="key-wrapper"><span class="second-func-label">x>=t</span><button class="ti-btn num" onclick='pressKey("9")'>9</button></div>
        <div class="key-wrapper"><span class="second-func-label"></span><button class="ti-btn op" onclick='pressKey("DIV")'>÷</button></div>
        
        <div class="key-wrapper"><span class="second-func-label">dsz</span><button class="ti-btn" onclick='pressKey("PRT")'>lbl</button></div>
        <div class="key-wrapper"><span class="second-func-label">sto</span><button class="ti-btn num" onclick='pressKey("4")'>4</button></div>
        <div class="key-wrapper"><span class="second-func-label">rcl</span><button class="ti-btn num" onclick='pressKey("5")'>5</button></div>
        <div class="key-wrapper"><span class="second-func-label">sum</span><button class="ti-btn num" onclick='pressKey("6")'>6</button></div>
        <div class="key-wrapper"><span class="second-func-label"></span><button class="ti-btn op" onclick='pressKey("MUL")'>×</button></div>
        
        <div class="key-wrapper"><span class="second-func-label">write</span><button class="ti-btn" onclick='pressKey("R_S")'>R/S</button></div>
        <div class="key-wrapper"><span class="second-func-label">10^x</span><button class="ti-btn num" onclick='pressKey("1")'>1</button></div>
        <div class="key-wrapper"><span class="second-func-label">e^x</span><button class="ti-btn num" onclick='pressKey("2")'>2</button></div>
        <div class="key-wrapper"><span class="second-func-label">pi</span><button class="ti-btn num" onclick='pressKey("3")'>3</button></div>
        <div class="key-wrapper"><span class="second-func-label"></span><button class="ti-btn op" onclick='pressKey("SUB")'>−</button></div>
        
        <div class="key-wrapper"><span class="second-func-label">ifflg</span><button class="ti-btn" onclick='pressKey("RST")'>RST</button></div>
        <div class="key-wrapper"><span class="second-func-label"></span><button class="ti-btn num" onclick='pressKey("0")'>0</button></div>
        <div class="key-wrapper"><span class="second-func-label">tg</span><button class="ti-btn num" onclick='pressKey("DOT")'>.</button></div>
        <div class="key-wrapper"><span class="second-func-label">ctg</span><button class="ti-btn" onclick='pressKey("SIGN")'>+/−</button></div>
        <div class="key-wrapper"><span class="second-func-label">add</span><button class="ti-btn op" onclick='pressKey("ADD")'>+</button></div>
    </div>
    
    
    <div class="case-embossed-brand">Stephaniia Bubnova, 2026</div>
</div>
<script>let displayValue="0",currentRegister=0,pendingOperation=null,activeAngleMode="DEG";let isSecondFunction=false,isInverseFunction=false,programCounter=0,isLearningMode=false,isProgramRunning=false,programInterval=null;let programMemory=Array(960).fill("00");let dataRegisters=Array(100).fill(0);let registerExpect=null;let registerBuffer="";let isNumberInputActive=false;const keyCodes={A:"11",B:"12",C:"13",D:"14",E:"15","2nd":"22",INV:"23",LNX:"24",CE:"25",CLR:"29",LRN:"32",SST:"33",BST:"34",IND:"35",GTO:"39",X2:"42",SQRT:"43",INVX:"44",FLG:"45",SIN:"49",STO:"52",RCL:"53",SUM:"54",Y_X:"55",COS:"59",EE:"62",7:"71",8:"72",9:"73",DIV:"79",PRT:"82",4:"84",5:"85",6:"86",MUL:"89",R_S:"91",1:"92",2:"93",3:"94",SUB:"99",RST:"81",0:"00",DOT:"93",SIGN:"94",ADD:"95"};const alternativeLabels={LNX:"log",CE:"deg",CLR:"rad",LRN:"x=t",SST:"int",BST:"cms",IND:"exc",GTO:"prd",X2:"ind",SQRT:"inv",INVX:"|x|",FLG:"x=t",SIN:"arcsin",STO:"lbl",RCL:"stflg",SUM:"p->r",Y_X:"mean",COS:"arccos",EE:"nop",7:"op",8:"lbl",9:"x>=t",PRT:"dsz",4:"sto",5:"rcl",6:"sum",R_S:"write",1:"10^x",2:"e^x",3:"pi",RST:"ifflg",DOT:"tg",SIGN:"ctg"};let originalLabels={};function updateDisplay(val){let str=String(val);if(str==="Error"||str==="NaN"){document.getElementById("display-text").innerText="Error";return}if(str.length>12&&!isNaN(parseFloat(str))){str=parseFloat(str).toPrecision(10)}if(!str.includes(".")&&!str.includes("e")&&!str.includes("E")){str+="."}document.getElementById("display-text").innerText=str.substring(0,12)}function setAngleMode(mode){activeAngleMode=mode;document.querySelectorAll(".angle-switch").forEach(btn=>btn.classList.remove("active"));document.getElementById("btn-"+mode.toLowerCase()).classList.add("active")}function toggleVisualKeyboard(show){document.querySelectorAll(".ti-btn").forEach(btn=>{let onclickAttr=btn.getAttribute("onclick")||"";let match=onclickAttr.match(/pressKey\('([^']+)'\)/);if(match&&alternativeLabels[match[1]]){let id=match[1];if(!originalLabels[id])originalLabels[id]=btn.innerText;btn.innerText=show?alternativeLabels[id]:originalLabels[id];btn.style.color=show?"#ffcc00":""}})}function convertCurrentToDeg(val){if(activeAngleMode==="RAD")return val*(180/Math.PI);if(activeAngleMode==="GRAD")return val*.9;return val}function convertCurrentToRad(val){if(activeAngleMode==="DEG")return val*(Math.PI/180);if(activeAngleMode==="GRAD")return val*(Math.PI/200);return val}function pressKey(key){let el2nd=document.getElementById("key-2nd"),elInv=document.getElementById("key-INV");if(key==="CLR"&&!isSecondFunction){displayValue="0";currentRegister=0;pendingOperation=null;isSecondFunction=false;isInverseFunction=false;isNumberInputActive=false;registerExpect=null;registerBuffer="";if(el2nd)el2nd.classList.remove("active-prefix");if(elInv)elInv.classList.remove("active-prefix");toggleVisualKeyboard(false);updateDisplay(displayValue);return}if(registerExpect!==null&&!isNaN(key)){registerBuffer+=key;if(registerBuffer.length===2){let regNum=parseInt(registerBuffer);let currentNum=parseFloat(displayValue)||0;if(registerExpect==="STO"){dataRegisters[regNum]=currentNum;isNumberInputActive=false}else if(registerExpect==="RCL"){displayValue=dataRegisters[regNum].toString();updateDisplay(displayValue);isNumberInputActive=false}else if(registerExpect==="SUM"){dataRegisters[regNum]=(dataRegisters[regNum]||0)+currentNum;displayValue=dataRegisters[regNum].toString();updateDisplay(displayValue);isNumberInputActive=false}registerExpect=null;registerBuffer=""}return}if(key==="2nd"){isSecondFunction=!isSecondFunction;if(el2nd)el2nd.classList.toggle("active-prefix",isSecondFunction);toggleVisualKeyboard(isSecondFunction);return}if(key==="INV"){isInverseFunction=!isInverseFunction;if(elInv)elInv.classList.toggle("active-prefix",isInverseFunction);return}if(isLearningMode&&key!=="LRN"&&key!=="SST"&&key!=="BST"){let code=keyCodes[key]||"00";programMemory[programCounter]=code;document.getElementById("display-text").innerText=String(programCounter).padStart(3,"0")+" "+code;programCounter=(programCounter+1)%960;isSecondFunction=false;toggleVisualKeyboard(false);if(el2nd)el2nd.classList.remove("active-prefix");return}processMainCalculations(key,el2nd,elInv)}function processMainCalculations(key,el2nd,elInv){let currentNum=parseFloat(displayValue)||0;if(isSecondFunction){isSecondFunction=false;if(el2nd)el2nd.classList.remove("active-prefix");toggleVisualKeyboard(false);if(key==="3"){displayValue=Math.PI.toString();isNumberInputActive=false}else if(key==="LNX"){displayValue=currentNum>0?Math.log10(currentNum).toString():"Error";isNumberInputActive=false}else if(key==="1"){displayValue=Math.pow(10,currentNum).toString();isNumberInputActive=false}else if(key==="2"){displayValue=Math.exp(currentNum).toString();isNumberInputActive=false}else if(key==="INVX"){displayValue=Math.abs(currentNum).toString();isNumberInputActive=false}else if(key==="CE"){displayValue=convertCurrentToDeg(currentNum).toString();isNumberInputActive=false}else if(key==="CLR"){displayValue=convertCurrentToRad(currentNum).toString();isNumberInputActive=false}else if(key==="DOT"){let angle=activeAngleMode==="DEG"?currentNum*Math.PI/180:activeAngleMode==="GRAD"?currentNum*Math.PI/200:currentNum;if(isInverseFunction){let atanVal=Math.atan(currentNum);displayValue=(activeAngleMode==="DEG"?atanVal*180/Math.PI:activeAngleMode==="GRAD"?atanVal*200/Math.PI:atanVal).toString();isInverseFunction=false;if(elInv)elInv.classList.remove("active-prefix")}else{displayValue=Math.tan(angle).toString()}isNumberInputActive=false}else if(key==="SIGN"){let angle=activeAngleMode==="DEG"?currentNum*Math.PI/180:activeAngleMode==="GRAD"?currentNum*Math.PI/200:currentNum;let tanVal=Math.tan(angle);displayValue=tanVal!==0?(1/tanVal).toString():"Error";isNumberInputActive=false}updateDisplay(displayValue);return}if(!isNaN(key)){if(!isNumberInputActive||displayValue==="0"||displayValue==="Error"){displayValue=String(key);isNumberInputActive=true}else{displayValue=displayValue+key}updateDisplay(displayValue);return}switch(key){case"DOT":if(!isNumberInputActive){displayValue="0.";isNumberInputActive=true}else if(!displayValue.includes("."))displayValue+=".";updateDisplay(displayValue);break;case"SIGN":displayValue=String(-currentNum);updateDisplay(displayValue);break;case"CE":displayValue="0";isNumberInputActive=false;updateDisplay(displayValue);break;case"ADD":case"SUB":case"MUL":case"DIV":case"Y_X":executePending();currentRegister=parseFloat(displayValue)||0;pendingOperation=key;isNumberInputActive=false;break;case"X2":displayValue=Math.pow(currentNum,2).toString();isNumberInputActive=false;updateDisplay(displayValue);break;case"SQRT":displayValue=currentNum>=0?Math.sqrt(currentNum).toString():"Error";isNumberInputActive=false;updateDisplay(displayValue);break;case"INVX":displayValue=currentNum!==0?(1/currentNum).toString():"Error";isNumberInputActive=false;updateDisplay(displayValue);break;case"LNX":displayValue=currentNum>0?Math.log(currentNum).toString():"Error";isNumberInputActive=false;updateDisplay(displayValue);break;case"SIN":let angleSin=activeAngleMode==="DEG"?currentNum*Math.PI/180:activeAngleMode==="GRAD"?currentNum*Math.PI/200:currentNum;displayValue=(isInverseFunction?activeAngleMode==="DEG"?Math.asin(currentNum)*180/Math.PI:activeAngleMode==="GRAD"?Math.asin(currentNum)*200/Math.PI:Math.asin(currentNum):Math.sin(angleSin)).toString();isInverseFunction=false;if(elInv)elInv.classList.remove("active-prefix");isNumberInputActive=false;updateDisplay(displayValue);break;case"COS":let angleCos=activeAngleMode==="DEG"?currentNum*Math.PI/180:activeAngleMode==="GRAD"?currentNum*Math.PI/200:currentNum;displayValue=(isInverseFunction?activeAngleMode==="DEG"?Math.acos(currentNum)*180/Math.PI:activeAngleMode==="GRAD"?Math.acos(currentNum)*200/Math.PI:Math.acos(currentNum):Math.cos(angleCos)).toString();isInverseFunction=false;if(elInv)elInv.classList.remove("active-prefix");isNumberInputActive=false;updateDisplay(displayValue);break;case"STO":registerExpect="STO";registerBuffer="";break;case"RCL":registerExpect="RCL";registerBuffer="";break;case"SUM":registerExpect="SUM";registerBuffer="";break;case"LRN":isLearningMode=!isLearningMode;if(isLearningMode){document.getElementById("display-text").innerText=String(programCounter).padStart(3,"0")+" "+programMemory[programCounter]}else{updateDisplay(displayValue)}break;case"SST":if(isLearningMode){programCounter=(programCounter+1)%960;document.getElementById("display-text").innerText=String(programCounter).padStart(3,"0")+" "+programMemory[programCounter]}else{executeStep()}break;case"BST":if(isLearningMode&&programCounter>0){programCounter--;document.getElementById("display-text").innerText=String(programCounter).padStart(3,"0")+" "+programMemory[programCounter]}break;case"R_S":if(isProgramRunning){clearInterval(programInterval);isProgramRunning=false}else{isProgramRunning=true;programInterval=setInterval(()=>{if(!executeStep()){clearInterval(programInterval);isProgramRunning=false}},40)}break;case"RST":programCounter=0;if(isLearningMode)document.getElementById("display-text").innerText="000 00";else{isNumberInputActive=false;updateDisplay(displayValue)}break}}function executePending(){if(!pendingOperation)return;let val=parseFloat(displayValue)||0;if(pendingOperation==="ADD")displayValue=(currentRegister+val).toString();if(pendingOperation==="SUB")displayValue=(currentRegister-val).toString();if(pendingOperation==="MUL")displayValue=(currentRegister*val).toString();if(pendingOperation==="DIV")displayValue=val!==0?(currentRegister/val).toString():"Error";if(pendingOperation==="Y_X")displayValue=Math.pow(currentRegister,val).toString();updateDisplay(displayValue);pendingOperation=null}function executeStep(){let code=programMemory[programCounter];if(code==="00"||code==="91"){executePending();return false}programCounter=(programCounter+1)%960;let foundKey=null;for(let key in keyCodes){if(keyCodes[key]===code){foundKey=key;break}}if(foundKey)pressKey(foundKey);return true}window.addEventListener("keydown",function(e){if(e.key>="0"&&e.key<="9")pressKey(e.key);if(e.key===".")pressKey("DOT");if(e.key==="Enter"||e.key==="+"){e.preventDefault();pressKey("ADD")}if(e.key==="-")pressKey("SUB");if(e.key==="*")pressKey("MUL");if(e.key==="/")pressKey("DIV");if(e.key==="Escape")pressKey("CLR")})</script>
</body>
</html>
